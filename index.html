<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry & Rosh | The Wedding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Lato:wght@300;400;700&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="config.js"></script>
    <script src="supabase.js"></script>
</head>

<body class="landing-body">
    <header class="floating-header">
        <div class="logo">Harry & Rosh</div>
        <div class="header-right">
            <form id="login-form" class="floating-login-form" onsubmit="event.preventDefault();">
                <input type="text" id="accessCode" name="accessCode" placeholder="Enter Access Code" required autocomplete="off">
                <button type="submit" class="btn-enter">Enter</button>
            </form>
            <div id="login-error" class="error-message hidden">Invalid Access Code</div>
        </div>
    </header>

    <main class="landing-hero">
        <div class="landing-content">
            <h1 class="wedding-headline">We're getting married</h1>
            <p class="wedding-details">August 2027 • Huntsham Court, Devon</p>
        </div>
    </main>

    <script src="auth.js"></script>
</body>

</html>
